<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="description" content="SPRINT - Game lari 3D seru! Hindari rintangan, kumpulkan koin, dan raih skor tertinggi!">
<title>SPRINT - 3D Runner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; font-family:'Segoe UI',system-ui,sans-serif; }
canvas { display:block; }

/* HUD */
#score-display {
  position:fixed; top:env(safe-area-inset-top, 16px); top:max(16px, env(safe-area-inset-top));
  left:50%; transform:translateX(-50%);
  color:#fff; font-size:clamp(18px,5vw,28px); font-weight:700;
  text-shadow:0 2px 12px rgba(0,200,255,0.9); letter-spacing:4px; pointer-events:none; z-index:10;
}
#lives-display {
  position:fixed; top:max(16px,env(safe-area-inset-top)); right:max(16px,env(safe-area-inset-right));
  color:#ff4455; font-size:clamp(14px,4vw,22px); pointer-events:none; z-index:10;
}
#speed-display {
  position:fixed; top:max(16px,env(safe-area-inset-top)); left:max(16px,env(safe-area-inset-left));
  color:#aaa; font-size:clamp(10px,3vw,14px); pointer-events:none; z-index:10;
}
#combo {
  position:fixed; top:clamp(50px,12vw,70px); left:50%; transform:translateX(-50%);
  color:#ffd700; font-size:clamp(14px,4vw,18px); font-weight:700;
  opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:10;
  text-shadow:0 0 20px rgba(255,215,0,0.8);
}

/* Lane dots */
.lane-indicator {
  position:fixed; bottom:max(140px,env(safe-area-inset-bottom,0px)+140px); left:50%; transform:translateX(-50%);
  display:flex; gap:8px; pointer-events:none; z-index:10;
}
.lane-dot {
  width:9px; height:9px; border-radius:50%;
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); transition:all 0.15s;
}
.lane-dot.active { background:#00c8ff; box-shadow:0 0 10px #00c8ff; }

/* Overlay / Menu */
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; z-index:30; backdrop-filter:blur(6px);
  padding:20px;
}
#overlay h1 {
  font-size:clamp(36px,12vw,72px); font-weight:900; letter-spacing:clamp(4px,2vw,12px);
  background:linear-gradient(90deg,#00c8ff,#ff00aa,#00c8ff); background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 2s linear infinite; margin-bottom:8px; text-align:center;
}
#overlay .sub { color:#888; font-size:clamp(11px,3vw,15px); letter-spacing:3px; margin-bottom:6px; }
#overlay .best { color:#ffd700; font-size:clamp(14px,4vw,20px); margin-bottom:clamp(20px,5vh,40px); }
#start-btn {
  background:linear-gradient(135deg,#00c8ff,#0066ff);
  border:none; color:#fff; font-size:clamp(16px,4vw,20px); font-weight:700;
  padding:clamp(14px,4vw,18px) clamp(36px,10vw,60px);
  border-radius:50px; cursor:pointer; letter-spacing:3px;
  box-shadow:0 0 30px rgba(0,200,255,0.5); transition:transform 0.15s,box-shadow 0.15s;
  -webkit-appearance:none; user-select:none;
}
#start-btn:active { transform:scale(0.96); }
#controls-hint {
  margin-top:clamp(20px,5vh,36px); color:#555; font-size:clamp(10px,2.5vw,13px);
  text-align:center; line-height:2;
}
#controls-hint span { color:#888; }
#mobile-hint { display:none; }

@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

/* Mobile touch buttons */
#touch-controls {
  position:fixed; bottom:env(safe-area-inset-bottom,0); left:0; right:0;
  height:130px; display:none;
  align-items:center; justify-content:space-between;
  padding:0 16px 8px; z-index:20; pointer-events:none;
}
.touch-btn {
  pointer-events:all;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:16px; color:rgba(255,255,255,0.7);
  font-size:28px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:background 0.1s, transform 0.08s;
  backdrop-filter:blur(4px);
}
.touch-btn:active { background:rgba(0,200,255,0.25); transform:scale(0.94); }
#btn-left  { width:80px; height:80px; }
#btn-right { width:80px; height:80px; }
#btn-jump  { width:100px; height:100px; font-size:36px; background:rgba(0,200,255,0.1); border-color:rgba(0,200,255,0.3); }
#btn-duck  { width:80px; height:80px; background:rgba(255,0,170,0.1); border-color:rgba(255,0,170,0.3); }
.touch-btn-group { display:flex; flex-direction:column; gap:8px; align-items:center; }

/* Show touch controls on mobile */
@media (pointer:coarse) {
  #touch-controls { display:flex; }
  #mobile-hint { display:block; }
  #keyboard-hint { display:none; }
  .lane-indicator { bottom:max(150px, calc(env(safe-area-inset-bottom) + 150px)); }
}
@media (max-width:480px) {
  #touch-controls { height:120px; }
}
</style>
</head>
<body>

<!-- HUD -->
<div id="score-display">000000</div>
<div id="lives-display">♥ ♥ ♥</div>
<div id="speed-display">SPEED: 1.0x</div>
<div id="combo"></div>
<div class="lane-indicator">
  <div class="lane-dot" id="dot0"></div>
  <div class="lane-dot active" id="dot1"></div>
  <div class="lane-dot" id="dot2"></div>
</div>

<!-- Overlay Menu -->
<div id="overlay">
  <h1>SPRINT</h1>
  <p class="sub">3D ENDLESS RUNNER</p>
  <p class="best" id="best-text">BEST: 0</p>
  <button id="start-btn">MAIN SEKARANG</button>
  <div id="controls-hint">
    <div id="keyboard-hint">
      <span>← →</span> atau <span>A D</span> = Pindah jalur<br>
      <span>SPACE / ↑</span> = Lompat &nbsp;|&nbsp; <span>↓ / S</span> = Jongkok
    </div>
    <div id="mobile-hint">
      Swipe kiri/kanan = Pindah jalur<br>
      Tombol bawah = Lompat &amp; Jongkok
    </div>
  </div>
</div>

<!-- Touch Controls (mobile only) -->
<div id="touch-controls">
  <div class="touch-btn-group">
    <button class="touch-btn" id="btn-left">◀</button>
  </div>
  <div class="touch-btn-group" style="flex-direction:row;gap:12px;align-items:flex-end;">
    <button class="touch-btn" id="btn-duck">▼</button>
    <button class="touch-btn" id="btn-jump">▲</button>
  </div>
  <div class="touch-btn-group">
    <button class="touch-btn" id="btn-right">▶</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
// Event listener dipasang PERTAMA — startGame() adalah function declaration (hoisted)
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', e=>{e.preventDefault();startGame();},{passive:false});

// Tampilkan error jelas jika Three.js gagal dimuat (CDN issue, dll)
if (typeof THREE === 'undefined') {
  var btn = document.getElementById('start-btn');
  btn.textContent = 'Gagal load game – refresh halaman';
  btn.style.cssText += ';background:#cc2200;cursor:default;pointer-events:none;';
  throw new Error('Three.js tidak berhasil dimuat dari CDN');
}

// ── Renderer ──────────────────────────────────────────────────────────────────
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference:'high-performance' });
} catch(e) {
  var btn = document.getElementById('start-btn');
  btn.textContent = 'WebGL tidak didukung di browser ini';
  btn.style.cssText += ';background:#cc2200;cursor:default;pointer-events:none;';
  throw e;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06061a, 0.018);

const camera = new THREE.PerspectiveCamera(72, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 3.5, 8);
camera.lookAt(0, 1, 0);

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x1a1a3a, 1.6));

const sun = new THREE.DirectionalLight(0x4488ff, 2.2);
sun.position.set(5, 20, 5);
sun.castShadow = true;
Object.assign(sun.shadow.mapSize, { width:1024, height:1024 });
Object.assign(sun.shadow.camera, { near:1, far:100, left:-20, right:20, top:20, bottom:-20 });
scene.add(sun);

const rimLight = new THREE.PointLight(0xff00aa, 2, 30);
rimLight.position.set(-5, 5, 0);
scene.add(rimLight);
scene.add(Object.assign(new THREE.PointLight(0x00c8ff, 1.5, 20), { position: new THREE.Vector3(0,4,10) }));

// ── Constants ─────────────────────────────────────────────────────────────────
const LANE_W = 2.5;
const LANES = [-LANE_W, 0, LANE_W];
const TILE_LEN = 10;
const TILE_CNT = 14;
const OBS_TYPES = ['low','high','wide','barrier'];
const GRAVITY = 22;
const JUMP_POWER = 9;

// ── State ─────────────────────────────────────────────────────────────────────
let S = {};
function resetState() {
  S = {
    running:false, score:0,
    bestScore: (function(){try{return parseInt(localStorage.getItem('sprint_best')||'0');}catch(e){return 0;}})(),
    lives:3, speed:12, lane:1, targetX:0, playerX:0,
    jumpVel:0, playerY:0, isJumping:false, isDucking:false,
    invincible:false, invincibleTimer:0,
    combo:0, comboTimer:0,
    tileOffset:0, spawnTimer:0, spawnInterval:2.2, diffTimer:0,
  };
}
resetState();

// ── Player 3D Model ───────────────────────────────────────────────────────────
const playerGroup = new THREE.Group();
scene.add(playerGroup);

const mat = (c, e=0, ei=0) => new THREE.MeshStandardMaterial({color:c,emissive:e,emissiveIntensity:ei,roughness:0.3,metalness:0.4});

const body  = new THREE.Mesh(new THREE.BoxGeometry(0.6,0.8,0.35), mat(0x0055ff,0x0033cc,0.3));
body.position.y = 1.2; body.castShadow = true; playerGroup.add(body);

const head  = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.45,0.45), mat(0xffcc99,0x996633,0.1));
head.position.y = 1.85; head.castShadow = true; playerGroup.add(head);

const visor = new THREE.Mesh(new THREE.BoxGeometry(0.35,0.12,0.1),
  new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:0.8,roughness:0,metalness:1}));
visor.position.set(0,1.88,0.23); playerGroup.add(visor);

function makeLimb(x, isLeg) {
  const g = new THREE.Group();
  if (isLeg) {
    const up = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.45,0.22), mat(0x222288,0x111155,0.2));
    up.position.y=-0.22; up.castShadow=true; g.add(up);
    const lo = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.4,0.2), mat(0x1a1a77,0x0d0d44,0.1));
    lo.position.y=-0.62; lo.castShadow=true; g.add(lo);
    const ft = new THREE.Mesh(new THREE.BoxGeometry(0.24,0.1,0.32), mat(0xff3300,0xcc1100,0.4));
    ft.position.set(0,-0.85,0.06); ft.castShadow=true; g.add(ft);
    g.position.set(x,0.82,0);
  } else {
    const up = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.42,0.18), mat(0x0055ff,0x0033cc,0.3));
    up.position.y=-0.21; up.castShadow=true; g.add(up);
    const lo = new THREE.Mesh(new THREE.BoxGeometry(0.16,0.36,0.16), mat(0xffcc99,0x996633,0.1));
    lo.position.y=-0.52; lo.castShadow=true; g.add(lo);
    g.position.set(x,1.58,0);
  }
  return g;
}
const leftLeg  = makeLimb(-0.17, true);
const rightLeg = makeLimb(0.17, true);
const leftArm  = makeLimb(-0.42, false);
const rightArm = makeLimb(0.42, false);
playerGroup.add(leftLeg, rightLeg, leftArm, rightArm);

const glowSphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.2,16,16),
  new THREE.MeshBasicMaterial({color:0x00c8ff,transparent:true,opacity:0.04,side:THREE.BackSide})
);
glowSphere.position.y = 1; playerGroup.add(glowSphere);

// ── Track ─────────────────────────────────────────────────────────────────────
function createTile(z) {
  const g = new THREE.Group();
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(LANE_W*3+1, 0.15, TILE_LEN),
    new THREE.MeshStandardMaterial({color:0x111122,roughness:0.9,metalness:0.1})
  );
  road.receiveShadow = true; road.position.y = -0.075; g.add(road);

  for (let i=0; i<2; i++) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.02,TILE_LEN*0.7),
      new THREE.MeshStandardMaterial({color:0x00c8ff,emissive:0x00c8ff,emissiveIntensity:0.6}));
    m.position.set(LANE_W*(i-0.5),0.01,0); g.add(m);
  }
  for (let s of [-1,1]) {
    const wall = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.6,TILE_LEN),
      new THREE.MeshStandardMaterial({color:0x0033aa,emissive:0x0011ff,emissiveIntensity:0.3}));
    wall.position.set(s*(LANE_W*1.5+0.6),0.2,0); g.add(wall);
    const strip = new THREE.Mesh(new THREE.BoxGeometry(0.05,0.05,TILE_LEN),
      new THREE.MeshBasicMaterial({color:0x00ffff}));
    strip.position.set(s*(LANE_W*1.5+0.5),0.5,0); g.add(strip);
    for (let dz=-TILE_LEN/2; dz<TILE_LEN/2; dz+=1.8) {
      const stud = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.08,8),
        new THREE.MeshBasicMaterial({color:0x00c8ff}));
      stud.position.set(s*(LANE_W*1.5+0.1),0.04,dz); g.add(stud);
    }
  }
  g.position.z = z; scene.add(g); return g;
}
const tiles = [];
for (let i=0; i<TILE_CNT; i++) tiles.push(createTile(-i*TILE_LEN + TILE_LEN*2));

// Stars
const sGeo = new THREE.BufferGeometry();
const sPos = new Float32Array(1500*3);
for (let i=0; i<1500*3; i+=3) {
  sPos[i]=(Math.random()-0.5)*300; sPos[i+1]=Math.random()*80+5; sPos[i+2]=(Math.random()-0.5)*200-20;
}
sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xffffff,size:0.2,sizeAttenuation:true})));

// City silhouette
(function(){
  const g = new THREE.Group();
  for (let i=0;i<20;i++) {
    const h=Math.random()*15+3, w=Math.random()*3+1;
    const b=new THREE.Mesh(new THREE.BoxGeometry(w,h,2),
      new THREE.MeshStandardMaterial({color:0x060618,emissive:0x0011aa,emissiveIntensity:0.2}));
    b.position.set(i*5-50,h/2-1,-65); g.add(b);
    if(Math.random()>0.4){
      const win=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.3,0.1),
        new THREE.MeshBasicMaterial({color:Math.random()>0.5?0xffcc44:0x00ccff}));
      win.position.set(i*5-50+(Math.random()-0.5),Math.random()*h-h/2,-64); g.add(win);
    }
  }
  scene.add(g);
})();

// ── Obstacles ─────────────────────────────────────────────────────────────────
const obstacles = [];
function createObstacle(type, lane, z) {
  const g = new THREE.Group();
  let hb;
  if (type==='low') {
    const box=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.7,1),
      new THREE.MeshStandardMaterial({color:0xff2200,emissive:0xff0000,emissiveIntensity:0.4,roughness:0.5,metalness:0.3}));
    box.position.y=0.35; box.castShadow=true; g.add(box);
    const s=new THREE.Mesh(new THREE.BoxGeometry(1.6,0.08,0.1),new THREE.MeshBasicMaterial({color:0xffaa00}));
    s.position.y=0.6; g.add(s);
    hb={w:1.4,h:0.7,d:0.9,yOff:0.35};
  } else if (type==='high') {
    const bar=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.25,0.5),
      new THREE.MeshStandardMaterial({color:0x9900ff,emissive:0x6600ff,emissiveIntensity:0.6,roughness:0.2,metalness:0.8}));
    bar.position.y=1.3; g.add(bar);
    for(let s of[-0.9,0.9]){
      const p=new THREE.Mesh(new THREE.BoxGeometry(0.12,1.3,0.12),new THREE.MeshStandardMaterial({color:0x440088}));
      p.position.set(s,0.65,0); g.add(p);
    }
    hb={w:1.8,h:0.25,d:0.45,yOff:1.3};
  } else if (type==='wide') {
    const box=new THREE.Mesh(new THREE.BoxGeometry(2.2,1.0,0.9),
      new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:0.4,roughness:0.4,metalness:0.2}));
    box.position.y=0.5; box.castShadow=true; g.add(box);
    hb={w:2.0,h:1.0,d:0.85,yOff:0.5};
  } else {
    const bar=new THREE.Mesh(new THREE.BoxGeometry(0.2,1.8,0.4),
      new THREE.MeshStandardMaterial({color:0x00ff88,emissive:0x00ff44,emissiveIntensity:0.5,roughness:0.2,metalness:0.9}));
    bar.position.y=0.9; bar.castShadow=true; g.add(bar);
    hb={w:0.18,h:1.8,d:0.38,yOff:0.9};
  }
  g.position.set(LANES[lane],0,z); scene.add(g);
  obstacles.push({mesh:g, type, lane, hb}); return g;
}

// ── Coins ─────────────────────────────────────────────────────────────────────
const coins = [];
function createCoin(lane, z, y=0.8) {
  const c=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.22,0.08,16),
    new THREE.MeshStandardMaterial({color:0xffd700,emissive:0xffa500,emissiveIntensity:0.6,roughness:0.1,metalness:1}));
  c.position.set(LANES[lane],y,z); c.rotation.x=Math.PI/2;
  scene.add(c); coins.push({mesh:c, collected:false}); return c;
}

// ── Particles ─────────────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(pos, color, count=8) {
  for(let i=0;i<count;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),new THREE.MeshBasicMaterial({color,transparent:true,opacity:1}));
    p.position.copy(pos);
    const vel=new THREE.Vector3((Math.random()-0.5)*5,Math.random()*4+1,(Math.random()-0.5)*3);
    scene.add(p); particles.push({mesh:p,vel,life:1});
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
const keys={};
// Keyboard
document.addEventListener('keydown',e=>{
  if(!keys[e.code]){
    keys[e.code]=true;
    if(!S.running) return;
    if((e.code==='ArrowLeft'||e.code==='KeyA')&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];}
    if((e.code==='ArrowRight'||e.code==='KeyD')&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];}
    if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!S.isJumping){S.jumpVel=JUMP_POWER;S.isJumping=true;}
    if(e.code==='ArrowDown'||e.code==='KeyS') S.isDucking=true;
  } else keys[e.code]=true;
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='ArrowDown'||e.code==='KeyS') S.isDucking=false;
});

// Touch buttons
function bindBtn(id, action) {
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();action('start');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();action('end');},{passive:false});
  el.addEventListener('mousedown',()=>action('start'));
  el.addEventListener('mouseup',()=>action('end'));
}
bindBtn('btn-left',(ev)=>{ if(!S.running)return; if(ev==='start'&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];} });
bindBtn('btn-right',(ev)=>{ if(!S.running)return; if(ev==='start'&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];} });
bindBtn('btn-jump',(ev)=>{ if(!S.running)return; if(ev==='start'&&!S.isJumping){S.jumpVel=JUMP_POWER;S.isJumping=true;} });
bindBtn('btn-duck',(ev)=>{ if(!S.running)return; S.isDucking=(ev==='start'); });

// Swipe detection
let touchStartX=0, touchStartY=0, swipeLocked=false;
document.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; swipeLocked=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(swipeLocked||!S.running) return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(Math.abs(dx)>35&&Math.abs(dx)>Math.abs(dy)*1.5){
    swipeLocked=true;
    if(dx<0&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];}
    if(dx>0&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];}
  }
},{passive:true});

// ── Game Logic ────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').style.display='none';
  document.getElementById('touch-controls').style.pointerEvents='all';
  S.running=true; S.score=0; S.lives=3; S.speed=12; S.lane=1;
  S.targetX=0; S.playerX=0; S.jumpVel=0; S.playerY=0;
  S.isJumping=false; S.isDucking=false; S.invincible=false;
  S.invincibleTimer=0; S.combo=0; S.comboTimer=0;
  S.tileOffset=0; S.spawnTimer=0; S.spawnInterval=2.2; S.diffTimer=0;
  // Only remove obstacles/coins/particles — never tiles or playerGroup
  obstacles.forEach(o=>{ if(o.mesh.parent) scene.remove(o.mesh); }); obstacles.length=0;
  coins.forEach(c=>{ if(c.mesh.parent) scene.remove(c.mesh); }); coins.length=0;
  particles.forEach(p=>{ if(p.mesh.parent) scene.remove(p.mesh); }); particles.length=0;
  // Restore playerGroup in case it was accidentally removed, then reset its transform
  if(!playerGroup.parent) scene.add(playerGroup);
  playerGroup.visible=true;
  playerGroup.scale.set(1,1,1);
  playerGroup.position.set(0,0,0);
  playerGroup.rotation.set(0,0,0);
  // Reset child positions that the run-animation offsets each frame
  body.position.y=1.2; head.position.y=1.85; visor.position.y=1.88;
  for(let i=0;i<5;i++) createCoin(Math.floor(Math.random()*3),-30-i*15);
  updateLivesUI();
  document.getElementById('speed-display').textContent='SPEED: 1.0x';
}

function gameOver() {
  S.running=false;
  document.getElementById('touch-controls').style.pointerEvents='none';
  if(S.score>S.bestScore){S.bestScore=S.score;try{localStorage.setItem('sprint_best',S.bestScore);}catch(e){}}
  document.getElementById('best-text').textContent=`BEST: ${Math.floor(S.bestScore)}`;
  document.getElementById('start-btn').textContent='MAIN LAGI';
  document.getElementById('overlay').style.display='flex';
}

function updateLivesUI(){
  document.getElementById('lives-display').textContent='♥ '.repeat(S.lives).trim();
}

// ── Render Loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let lastT=0;
function animate(){
  requestAnimationFrame(animate);
  const now=clock.getElapsedTime();
  const dt=Math.min(now-lastT, 0.05); lastT=now;

  if(!S.running){
    playerGroup.position.y=Math.sin(now*1.5)*0.05;
    playerGroup.rotation.y=Math.sin(now*0.5)*0.1;
    renderer.render(scene,camera); return;
  }

  S.score += dt*10*(S.speed/12);
  S.diffTimer += dt;
  if(S.diffTimer>8){
    S.diffTimer=0; S.speed=Math.min(S.speed+0.8,32);
    S.spawnInterval=Math.max(S.spawnInterval-0.08,1.0);
    document.getElementById('speed-display').textContent=`SPEED: ${(S.speed/12).toFixed(1)}x`;
  }
  document.getElementById('score-display').textContent=Math.floor(S.score).toString().padStart(6,'0');

  if(S.comboTimer>0){S.comboTimer-=dt;if(S.comboTimer<=0)S.combo=0;}

  // Player
  S.playerX += (S.targetX-S.playerX)*12*dt;
  if(S.isJumping){
    S.playerY+=S.jumpVel*dt; S.jumpVel-=GRAVITY*dt;
    if(S.playerY<=0){S.playerY=0;S.jumpVel=0;S.isJumping=false;}
  }
  const duckScale=S.isDucking?0.5:1.0;
  playerGroup.scale.y+=(duckScale-playerGroup.scale.y)*15*dt;
  playerGroup.position.set(S.playerX,S.playerY,0);

  if(!S.isJumping){
    const b=Math.sin(now*S.speed*0.7)*0.04;
    body.position.y=1.2+b; head.position.y=1.85+b; visor.position.y=1.88+b;
  }
  const sw=Math.sin(now*S.speed*0.7)*0.4;
  leftLeg.rotation.x=sw; rightLeg.rotation.x=-sw;
  leftArm.rotation.x=-sw*0.6; rightArm.rotation.x=sw*0.6;

  if(S.invincible){
    S.invincibleTimer-=dt;
    playerGroup.visible=Math.sin(now*20)>0;
    if(S.invincibleTimer<=0){S.invincible=false;playerGroup.visible=true;}
  }
  rimLight.intensity=1.5+Math.sin(now*3)*0.5;

  // Tiles
  tiles.forEach(t=>{
    t.position.z+=S.speed*dt;
    if(t.position.z>TILE_LEN*3) t.position.z-=TILE_CNT*TILE_LEN;
  });

  // Spawn obstacles
  S.spawnTimer-=dt;
  if(S.spawnTimer<=0){
    S.spawnTimer=S.spawnInterval+Math.random()*0.5;
    createObstacle(OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)],Math.floor(Math.random()*3),-60);
    if(Math.random()>0.4){
      const cl=Math.floor(Math.random()*3), cy=Math.random()>0.5?0.8:1.8;
      for(let ci=0;ci<3;ci++) createCoin(cl,-60-ci*3,cy);
    }
  }

  // Update obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const obs=obstacles[i];
    obs.mesh.position.z+=S.speed*dt;
    if(obs.type==='barrier') obs.mesh.rotation.y+=dt*2;
    if(obs.mesh.position.z>12){scene.remove(obs.mesh);obstacles.splice(i,1);continue;}

    if(!S.invincible&&obs.mesh.position.z>-1&&obs.mesh.position.z<2){
      const hb=obs.hb;
      const dx=Math.abs(S.playerX-obs.mesh.position.x);
      const dz=Math.abs(obs.mesh.position.z);
      const pTop=S.isDucking?1.0:2.0;
      const pBot=S.playerY;
      const oTop=hb.yOff+hb.h/2, oBot=hb.yOff-hb.h/2;
      if(dx<(0.3+hb.w/2)&&dz<(0.5+hb.d/2)&&pTop>oBot&&pBot<oTop){
        S.lives--; updateLivesUI();
        spawnParticles(playerGroup.position.clone().add(new THREE.Vector3(0,1,0)),0xff2200,12);
        S.invincible=true; S.invincibleTimer=2.0; S.combo=0;
        if(S.lives<=0){gameOver();return;}
      }
    }
  }

  // Coins
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    c.mesh.position.z+=S.speed*dt; c.mesh.rotation.y+=dt*3;
    if(c.mesh.position.z>12){scene.remove(c.mesh);coins.splice(i,1);continue;}
    if(!c.collected){
      const dx=Math.abs(S.playerX-c.mesh.position.x);
      const dy=Math.abs(S.playerY-c.mesh.position.y);
      const dz=Math.abs(c.mesh.position.z);
      if(dx<0.6&&dy<0.8&&dz<1.0){
        c.collected=true; scene.remove(c.mesh); coins.splice(i,1);
        S.score+=50; S.combo++; S.comboTimer=3;
        spawnParticles(c.mesh.position.clone(),0xffd700,5);
        if(S.combo>3){
          const el=document.getElementById('combo');
          el.textContent=`COMBO x${S.combo}!`; el.style.opacity='1';
          setTimeout(()=>el.style.opacity='0',600);
        }
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt*1.5;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.vel.y-=9.8*dt; p.mesh.material.opacity=p.life;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
  }

  for(let i=0;i<3;i++) document.getElementById(`dot${i}`).classList.toggle('active',i===S.lane);
  camera.position.x+=(S.playerX*0.1-camera.position.x)*3*dt;
  renderer.render(scene,camera);
}
// Guard against animate() being started more than once
let _loopStarted = false;
if (!_loopStarted) { _loopStarted = true; animate(); }

// Resize
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Prevent context menu on long press mobile
window.addEventListener('contextmenu',e=>e.preventDefault());
</script>
</body>
</html>
