<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="description" content="SPRINT - Game lari 3D seru! Hindari rintangan, kumpulkan koin, dan raih skor tertinggi!">
<title>SPRINT - 3D Runner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; touch-action:none; font-family:'Segoe UI',system-ui,sans-serif; }
canvas { display:block; }

/* HUD */
#score-display {
  position:fixed; top:env(safe-area-inset-top, 16px); top:max(16px, env(safe-area-inset-top));
  left:50%; transform:translateX(-50%);
  color:#fff; font-size:clamp(18px,5vw,28px); font-weight:700;
  text-shadow:0 2px 12px rgba(0,200,255,0.9); letter-spacing:4px; pointer-events:none; z-index:10;
}
#lives-display {
  position:fixed; top:max(16px,env(safe-area-inset-top)); right:max(16px,env(safe-area-inset-right));
  color:#ff4455; font-size:clamp(14px,4vw,22px); pointer-events:none; z-index:10;
}
#speed-display {
  position:fixed; top:max(16px,env(safe-area-inset-top)); left:max(16px,env(safe-area-inset-left));
  color:#aaa; font-size:clamp(10px,3vw,14px); pointer-events:none; z-index:10;
}
#combo {
  position:fixed; top:clamp(50px,12vw,70px); left:50%; transform:translateX(-50%);
  color:#ffd700; font-size:clamp(14px,4vw,18px); font-weight:700;
  opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:10;
  text-shadow:0 0 20px rgba(255,215,0,0.8);
}

/* Power-up HUD */
#powerup-hud {
  position:fixed; top:max(44px,calc(env(safe-area-inset-top) + 44px)); left:max(16px,env(safe-area-inset-left));
  display:flex; align-items:center; gap:8px;
  opacity:0; transform:translateX(-8px);
  transition:opacity 0.3s, transform 0.3s;
  pointer-events:none; z-index:10;
}
#powerup-hud.visible { opacity:1; transform:translateX(0); }
#powerup-icon {
  width:36px; height:36px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; border:2px solid currentColor;
}
#powerup-hud.pu-shield  #powerup-icon { background:rgba(0,120,255,0.25); color:#44aaff; box-shadow:0 0 14px rgba(0,120,255,0.6); }
#powerup-hud.pu-magnet  #powerup-icon { background:rgba(255,200,0,0.2);  color:#ffd700; box-shadow:0 0 14px rgba(255,200,0,0.6); }
#powerup-hud.pu-slowmo  #powerup-icon { background:rgba(170,0,255,0.25); color:#cc66ff; box-shadow:0 0 14px rgba(170,0,255,0.6); }
#powerup-label { color:#ccc; font-size:11px; letter-spacing:2px; line-height:1.3; }
#powerup-label .pu-name { font-weight:700; font-size:13px; }
#powerup-bar-wrap {
  width:60px; height:4px; background:rgba(255,255,255,0.1);
  border-radius:2px; overflow:hidden;
}
#powerup-bar {
  height:100%; width:100%; border-radius:2px;
  transition:width 0.1s linear;
}
#powerup-hud.pu-shield #powerup-bar { background:#44aaff; box-shadow:0 0 6px #44aaff; }
#powerup-hud.pu-magnet #powerup-bar { background:#ffd700; box-shadow:0 0 6px #ffd700; }
#powerup-hud.pu-slowmo #powerup-bar { background:#cc66ff; box-shadow:0 0 6px #cc66ff; }

/* Slowmo vignette overlay */
#slowmo-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:8;
  background:radial-gradient(ellipse at center, transparent 50%, rgba(80,0,140,0.35) 100%);
  opacity:0; transition:opacity 0.4s;
}
#slowmo-overlay.active { opacity:1; }

/* Lane dots */
.lane-indicator {
  position:fixed; bottom:max(140px,env(safe-area-inset-bottom,0px)+140px); left:50%; transform:translateX(-50%);
  display:flex; gap:8px; pointer-events:none; z-index:10;
}
.lane-dot {
  width:9px; height:9px; border-radius:50%;
  background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.4); transition:all 0.15s;
}
.lane-dot.active { background:#00c8ff; box-shadow:0 0 10px #00c8ff; }

/* Overlay / Menu */
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,0.88);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  color:#fff; z-index:30; backdrop-filter:blur(6px);
  padding:20px;
}
#overlay h1 {
  font-size:clamp(36px,12vw,72px); font-weight:900; letter-spacing:clamp(4px,2vw,12px);
  background:linear-gradient(90deg,#00c8ff,#ff00aa,#00c8ff); background-size:200%;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  animation:shimmer 2s linear infinite; margin-bottom:8px; text-align:center;
}
#overlay .sub { color:#888; font-size:clamp(11px,3vw,15px); letter-spacing:3px; margin-bottom:6px; }
#overlay .best { color:#ffd700; font-size:clamp(14px,4vw,20px); margin-bottom:clamp(20px,5vh,40px); }
#start-btn {
  background:linear-gradient(135deg,#00c8ff,#0066ff);
  border:none; color:#fff; font-size:clamp(16px,4vw,20px); font-weight:700;
  padding:clamp(14px,4vw,18px) clamp(36px,10vw,60px);
  border-radius:50px; cursor:pointer; letter-spacing:3px;
  box-shadow:0 0 30px rgba(0,200,255,0.5); transition:transform 0.15s,box-shadow 0.15s;
  -webkit-appearance:none; user-select:none;
}
#start-btn:active { transform:scale(0.96); }
#controls-hint {
  margin-top:clamp(20px,5vh,36px); color:#555; font-size:clamp(10px,2.5vw,13px);
  text-align:center; line-height:2;
}
#controls-hint span { color:#888; }
#mobile-hint { display:none; }

@keyframes shimmer { 0%{background-position:0%} 100%{background-position:200%} }

/* ── Leaderboard ── */
#leaderboard {
  width:100%; max-width:340px;
  margin:clamp(10px,2vh,18px) 0 clamp(10px,2vh,16px);
}
#leaderboard-title {
  font-size:clamp(10px,2.5vw,13px); letter-spacing:4px; color:#00c8ff;
  text-align:center; margin-bottom:10px;
  text-shadow:0 0 12px rgba(0,200,255,0.7);
}
#lb-table {
  width:100%; border-collapse:collapse;
}
#lb-table tr { border-bottom:1px solid rgba(0,200,255,0.1); }
#lb-table tr:last-child { border-bottom:none; }
#lb-table td {
  padding:7px 6px; font-size:clamp(11px,2.8vw,14px); color:#ccc;
  white-space:nowrap;
}
#lb-table .lb-rank { color:#555; font-variant-numeric:tabular-nums; width:28px; }
#lb-table .lb-name { color:#eee; max-width:140px; overflow:hidden; text-overflow:ellipsis; }
#lb-table .lb-score {
  text-align:right; font-weight:700; font-variant-numeric:tabular-nums;
  color:#00c8ff; text-shadow:0 0 8px rgba(0,200,255,0.6);
}
#lb-table tr.lb-gold   .lb-rank { color:#ffd700; text-shadow:0 0 8px rgba(255,215,0,0.8); }
#lb-table tr.lb-silver .lb-rank { color:#c0c0c0; }
#lb-table tr.lb-bronze .lb-rank { color:#cd7f32; }
#lb-table tr.lb-new td { background:rgba(0,200,255,0.07); }
#lb-table tr.lb-new .lb-score { color:#ff00aa; text-shadow:0 0 8px rgba(255,0,170,0.7); animation:pulse-new 0.8s ease-in-out infinite alternate; }
@keyframes pulse-new { from{opacity:0.7} to{opacity:1} }
#lb-empty { color:#444; font-size:13px; text-align:center; padding:14px 0; letter-spacing:2px; }
#lb-clear-btn {
  display:block; margin:10px auto 0;
  background:transparent; border:1px solid rgba(255,60,60,0.35);
  color:rgba(255,80,80,0.7); font-size:11px; letter-spacing:2px;
  padding:5px 16px; border-radius:20px; cursor:pointer;
  transition:all 0.15s;
}
#lb-clear-btn:hover { background:rgba(255,40,40,0.12); color:#ff5555; border-color:rgba(255,60,60,0.6); }

/* ── Name-entry modal ── */
#name-modal {
  display:none; position:fixed; inset:0; z-index:50;
  background:rgba(0,0,0,0.92); backdrop-filter:blur(8px);
  align-items:center; justify-content:center; flex-direction:column;
  padding:30px;
}
#name-modal.visible { display:flex; }
#name-modal h2 {
  font-size:clamp(18px,5vw,26px); font-weight:900; letter-spacing:6px;
  background:linear-gradient(90deg,#ff00aa,#00c8ff); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; margin-bottom:6px; text-align:center;
}
#name-modal .nm-score {
  color:#ffd700; font-size:clamp(20px,6vw,32px); font-weight:700;
  letter-spacing:4px; margin-bottom:20px;
  text-shadow:0 0 16px rgba(255,215,0,0.7);
}
#name-modal .nm-label { color:#888; font-size:13px; letter-spacing:2px; margin-bottom:10px; }
#name-input {
  background:rgba(255,255,255,0.05); border:1px solid rgba(0,200,255,0.5);
  color:#fff; font-size:clamp(16px,4vw,20px); font-weight:700;
  text-align:center; letter-spacing:3px; padding:12px 20px;
  border-radius:12px; width:100%; max-width:260px;
  outline:none; margin-bottom:20px;
  text-transform:uppercase;
  box-shadow:0 0 20px rgba(0,200,255,0.15);
  -webkit-appearance:none;
}
#name-input:focus { border-color:#00c8ff; box-shadow:0 0 28px rgba(0,200,255,0.3); }
#name-submit {
  background:linear-gradient(135deg,#ff00aa,#9900ff);
  border:none; color:#fff; font-size:clamp(14px,3.5vw,17px); font-weight:700;
  padding:14px 48px; border-radius:50px; cursor:pointer; letter-spacing:3px;
  box-shadow:0 0 24px rgba(255,0,170,0.4); transition:transform 0.12s;
  -webkit-appearance:none; user-select:none;
}
#name-submit:active { transform:scale(0.96); }
#name-skip {
  margin-top:14px; background:transparent; border:none;
  color:#444; font-size:12px; letter-spacing:2px; cursor:pointer;
  transition:color 0.15s;
}
#name-skip:hover { color:#777; }

/* Mute button */
#mute-btn {
  position:fixed; bottom:max(16px,env(safe-area-inset-bottom)); left:max(16px,env(safe-area-inset-left));
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2);
  color:rgba(255,255,255,0.8); font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  z-index:25; transition:background 0.15s, transform 0.1s;
  backdrop-filter:blur(6px); user-select:none;
}
#mute-btn:active { transform:scale(0.9); }
#mute-btn.muted { background:rgba(255,60,60,0.15); border-color:rgba(255,60,60,0.3); }

/* Screen shake */
@keyframes shake {
  0%,100%{transform:translate(0,0);}
  15%{transform:translate(-6px,3px);}
  30%{transform:translate(6px,-3px);}
  45%{transform:translate(-4px,5px);}
  60%{transform:translate(4px,-2px);}
  75%{transform:translate(-2px,2px);}
}
.screen-shake { animation:shake 0.35s ease-out; }

/* Mobile touch buttons */
#touch-controls {
  position:fixed; bottom:env(safe-area-inset-bottom,0); left:0; right:0;
  height:130px; display:none;
  align-items:center; justify-content:space-between;
  padding:0 16px 8px; z-index:20; pointer-events:none;
}
.touch-btn {
  pointer-events:all;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:16px; color:rgba(255,255,255,0.7);
  font-size:28px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; user-select:none; -webkit-user-select:none;
  transition:background 0.1s, transform 0.08s;
  backdrop-filter:blur(4px);
}
.touch-btn:active { background:rgba(0,200,255,0.25); transform:scale(0.94); }
#btn-left  { width:80px; height:80px; }
#btn-right { width:80px; height:80px; }
#btn-jump  { width:100px; height:100px; font-size:36px; background:rgba(0,200,255,0.1); border-color:rgba(0,200,255,0.3); }
#btn-duck  { width:80px; height:80px; background:rgba(255,0,170,0.1); border-color:rgba(255,0,170,0.3); }
.touch-btn-group { display:flex; flex-direction:column; gap:8px; align-items:center; }

/* Show touch controls on mobile */
@media (pointer:coarse) {
  #touch-controls { display:flex; }
  #mobile-hint { display:block; }
  #keyboard-hint { display:none; }
  .lane-indicator { bottom:max(150px, calc(env(safe-area-inset-bottom) + 150px)); }
}
@media (max-width:480px) {
  #touch-controls { height:120px; }
}
</style>
</head>
<body>

    </div>

      Tombol bawah = Lompat &amp; Jongkok
    </div>

<!-- Name Entry Modal -->

  <h2>SKOR BARU!</h2>
  <p class="nm-score" id="nm-score-display">000000</p>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
// Tampilkan error jelas jika Three.js gagal dimuat (CDN issue, dll)
if (typeof THREE === 'undefined') {
  var btn = document.getElementById('start-btn');
  btn.textContent = 'Gagal load game – refresh halaman';
  btn.style.cssText += ';background:#cc2200;cursor:default;pointer-events:none;';
  throw new Error('Three.js tidak berhasil dimuat dari CDN');
}

// ── Audio Engine (Web Audio API — no external files) ─────────────────────────
const Audio = (() => {
  let ctx = null, masterGain = null, musicGain = null, sfxGain = null;
  let muted = false;
  let musicNodes = {}; // holds running oscillators for the beat
  let beatInterval = null;
  let audioReady = false;

  function init() {
    if (audioReady) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 0.7;
      sfxGain    = ctx.createGain(); sfxGain.gain.value = 1.0;
      musicGain  = ctx.createGain(); musicGain.gain.value = 0.22;
      sfxGain.connect(masterGain);
      musicGain.connect(masterGain);
      masterGain.connect(ctx.destination);
      audioReady = true;
    } catch(e) { console.warn('Web Audio not supported'); }
  }

  // ── Utility: play a shaped tone ──
  function tone(freq, type, startT, dur, gainPeak, gainEnd=0, dest=sfxGain, detune=0) {
    if (!audioReady || muted) return;
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type; osc.frequency.value = freq; osc.detune.value = detune;
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(gainPeak, startT + 0.01);
    g.gain.exponentialRampToValueAtTime(Math.max(gainEnd, 0.0001), startT + dur);
    osc.connect(g); g.connect(dest);
    osc.start(startT); osc.stop(startT + dur + 0.02);
  }

  // ── SFX ──────────────────────────────────────────────────────────────────────
  function sfxJump() {
    if (!audioReady) return;
    const t = ctx.currentTime;
    // Rising sweep
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(660, t + 0.18);
    g.gain.setValueAtTime(0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(g); g.connect(sfxGain);
    osc.start(t); osc.stop(t + 0.25);
    // Airy layer
    tone(440, 'triangle', t, 0.15, 0.2, 0, sfxGain);
  }

  function sfxCoin() {
    if (!audioReady) return;
    const t = ctx.currentTime;
    // Two-note ding
    tone(1046.5, 'sine', t,       0.12, 0.55, 0, sfxGain); // C6
    tone(1318.5, 'sine', t + 0.06, 0.14, 0.6,  0, sfxGain); // E6
    // Shimmer overtone
    tone(2093,   'sine', t + 0.02, 0.1,  0.15, 0, sfxGain); // C7
  }

  function sfxHit() {
    if (!audioReady) return;
    const t = ctx.currentTime;
    // Low thud — noise burst via sawtooth detuned cluster
    for (let i = 0; i < 4; i++) {
      tone(60 + i*8, 'sawtooth', t, 0.25, 0.4, 0, sfxGain, (Math.random()-0.5)*40);
    }
    // Sub boom
    const sub = ctx.createOscillator();
    const sg  = ctx.createGain();
    sub.type = 'sine'; sub.frequency.setValueAtTime(80, t);
    sub.frequency.exponentialRampToValueAtTime(30, t + 0.3);
    sg.gain.setValueAtTime(0.7, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
    sub.connect(sg); sg.connect(sfxGain);
    sub.start(t); sub.stop(t + 0.38);
    // Screen shake
    document.body.classList.remove('screen-shake');
    requestAnimationFrame(() => document.body.classList.add('screen-shake'));
    setTimeout(() => document.body.classList.remove('screen-shake'), 380);
  }

  function sfxGameOver() {
    if (!audioReady) return;
    const t = ctx.currentTime;
    // Descending chord sweep
    const freqs = [523.25, 415.30, 349.23, 261.63]; // C5 Ab4 F4 C4
    freqs.forEach((f, i) => {
      tone(f, 'sawtooth', t + i*0.18, 0.35, 0.3, 0, sfxGain);
      tone(f/2, 'sine',   t + i*0.18, 0.4,  0.2, 0, sfxGain);
    });
    // Final low drone
    tone(65.4, 'sawtooth', t + 0.7, 0.8, 0.35, 0.05, sfxGain);
  }

  // ── Background Music (cyberpunk beat) ────────────────────────────────────────
  // Pattern: kick + bass + arp — all procedural, no samples
  const BPM = 128;
  const BEAT = 60 / BPM; // seconds per beat

  function kick(t) {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);
    g.gain.setValueAtTime(0.9, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    osc.connect(g); g.connect(musicGain);
    osc.start(t); osc.stop(t + 0.25);
  }

  function snare(t) {
    // White noise approximation with filtered oscillators
    for (let i=0; i<3; i++) {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type='sawtooth'; o.frequency.value=200+Math.random()*200;
      o.detune.value=(Math.random()-0.5)*1200;
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t+0.12);
    }
  }

  function hat(t, vol=0.12) {
    for (let i=0; i<2; i++) {
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.type='square'; o.frequency.value=6000+Math.random()*4000;
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.04);
      o.connect(g); g.connect(musicGain);
      o.start(t); o.stop(t+0.05);
    }
  }

  // Bass synth note
  function bass(t, freq, dur=BEAT*0.4) {
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    osc.type='sawtooth'; osc.frequency.value=freq;
    osc.detune.value=-8;
    g.gain.setValueAtTime(0.5, t);
    g.gain.setValueAtTime(0.4, t+dur*0.7);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    osc.connect(g); g.connect(musicGain);
    osc.start(t); osc.stop(t+dur+0.02);
  }

  // Arp synth note
  function arp(t, freq, dur=BEAT*0.12) {
    tone(freq, 'square', t, dur, 0.18, 0, musicGain);
    tone(freq*2, 'sine', t, dur*0.8, 0.06, 0, musicGain);
  }

  // 4-bar pattern (16 beats)
  const BASS_LINE = [55, 55, 82.4, 55,  73.4, 55, 55, 82.4,
                     55, 55, 65.4, 55,  61.7, 55, 55, 73.4];
  const ARP_LINE  = [220,0,277,0, 330,0,415,0, 330,0,277,0, 220,0,247,0];

  function scheduleMeasure(startT) {
    // 16 16th-notes per measure (2 bars of 8)
    for (let i=0;i<16;i++) {
      const t = startT + i*BEAT*0.5;
      // Kick: beats 1 and 3 (indices 0 and 8)
      if(i===0||i===8) kick(t);
      // Snare: beats 2 and 4 (indices 4 and 12)
      if(i===4||i===12) snare(t);
      // Hi-hat every 16th
      hat(t, i%2===0 ? 0.1 : 0.06);
      // Bass
      if(BASS_LINE[i]) bass(t, BASS_LINE[i], BEAT*0.45);
      // Arp
      if(ARP_LINE[i]) arp(t, ARP_LINE[i]);
    }
  }

  let musicNextTime = 0;
  let musicTimer = null;
  const MEASURE_DUR = BEAT * 8; // 16 × BEAT*0.5

  function startMusic() {
    if (!audioReady || muted) return;
    stopMusic();
    musicNextTime = ctx.currentTime + 0.05;
    function loop() {
      // Schedule 2 measures ahead
      while (musicNextTime < ctx.currentTime + MEASURE_DUR * 2) {
        scheduleMeasure(musicNextTime);
        musicNextTime += MEASURE_DUR;
      }
      musicTimer = setTimeout(loop, (MEASURE_DUR * 0.8) * 1000);
    }
    loop();
  }

  function stopMusic() {
    if (musicTimer) { clearTimeout(musicTimer); musicTimer=null; }
    // Fade out master
    if (audioReady && musicGain) {
      const t = ctx.currentTime;
      musicGain.gain.setValueAtTime(musicGain.gain.value, t);
      musicGain.gain.linearRampToValueAtTime(0, t+0.4);
      setTimeout(()=>{ if(musicGain) musicGain.gain.value=0.22; }, 500);
    }
  }

  // ── Mute toggle ──────────────────────────────────────────────────────────────
  const muteBtn = document.getElementById('mute-btn');
  muteBtn.addEventListener('click', () => {
    if (!audioReady) { init(); }
    muted = !muted;
    if (muted) {
      masterGain.gain.setTargetAtTime(0, ctx.currentTime, 0.05);
      muteBtn.textContent = '🔇';
      muteBtn.classList.add('muted');
    } else {
      masterGain.gain.setTargetAtTime(0.7, ctx.currentTime, 0.05);
      muteBtn.textContent = '🔊';
      muteBtn.classList.remove('muted');
      if (!S.running) {} else startMusic();
    }
  });

  function sfxPowerup(type) {
    if (!audioReady) return;
    const t = ctx.currentTime;
    if (type === 'shield') {
      // Rising shimmer chord
      [440, 554, 659, 880].forEach((f, i) => tone(f, 'sine', t + i*0.06, 0.4, 0.3, 0, sfxGain));
    } else if (type === 'magnet') {
      // Warm electric buzz + high ping
      tone(110, 'sawtooth', t, 0.18, 0.35, 0, sfxGain);
      tone(880, 'sine',     t + 0.1, 0.25, 0.4, 0, sfxGain);
      tone(1760,'sine',     t + 0.18, 0.15, 0.3, 0, sfxGain);
    } else if (type === 'slowmo') {
      // Dreamy descending sweep
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(220, t + 0.5);
      g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
      osc.connect(g); g.connect(sfxGain); osc.start(t); osc.stop(t + 0.6);
      tone(440, 'triangle', t + 0.1, 0.4, 0.2, 0, sfxGain);
    }
  }

  return { init, sfxJump, sfxCoin, sfxHit, sfxGameOver, sfxPowerup, startMusic, stopMusic };
})();

const PU_HUD = (() => {
  const hud   = document.getElementById('powerup-hud');
  const icon  = document.getElementById('powerup-icon');
  const name  = document.getElementById('powerup-name');
  const timer = document.getElementById('powerup-timer');
  const bar   = document.getElementById('powerup-bar');

  function show(type) {
    const def = PU_DEFS[type];
    hud.className = 'visible ' + def.hudClass;
    icon.textContent = def.icon;
    name.textContent = def.label;
  }
  function update(remaining, total) {
    timer.textContent = remaining.toFixed(1) + 's';
    bar.style.width = Math.max(0, (remaining / total) * 100).toFixed(1) + '%';
  }
  function hide() {
    hud.className = '';
    hud.classList.remove('visible');
  }
  return { show, update, hide };
})();

// ── Activate a power-up ───────────────────────────────────────────────────────
function activatePowerup(type) {
  const def = PU_DEFS[type];
  // Cancel previous if any
  deactivatePowerup(true);

  S.activePowerup  = type;
  S.powerupTimer   = def.dur;
  S.powerupDuration = def.dur;
  PU_HUD.show(type);
  Audio.sfxPowerup(type);

  if (type === 'shield') {
    S.invincible = true;
    S.invincibleTimer = def.dur;
    glowSphere.material.color.setHex(0x2288ff);
    glowSphere.material.opacity = 0.18;
    playerLight.color.setHex(0x2288ff);
    playerLight.intensity = 3;
  } else if (type === 'slowmo') {
    S.baseSpeed = S.speed;
    S.speed *= 0.5;
    document.getElementById('slowmo-overlay').classList.add('active');
  }
  // magnet: handled per-frame in coin update
}

function deactivatePowerup(silent = false) {
  if (!S.activePowerup) return;
  const prev = S.activePowerup;

  if (prev === 'shield') {
    glowSphere.material.color.setHex(0x00c8ff);
    glowSphere.material.opacity = 0.04;
    playerLight.intensity = 0;
    // Only cancel shield-invincibility if it was from power-up (not from hit)
    if (S.invincible && S.invincibleTimer > 0) {
      S.invincible = false; S.invincibleTimer = 0;
      playerGroup.visible = true;
    }
  } else if (prev === 'slowmo') {
    S.speed = S.baseSpeed;
    document.getElementById('slowmo-overlay').classList.remove('active');
  }

  S.activePowerup = null;
  S.powerupTimer  = 0;
  PU_HUD.hide();
}

document.addEventListener('keydown',e=>{
  if(!keys[e.code]){
    keys[e.code]=true;
    if(!S.running) return;
    if((e.code==='ArrowLeft'||e.code==='KeyA')&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];}
    if((e.code==='ArrowRight'||e.code==='KeyD')&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];}
    if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!S.isJumping){S.jumpVel=JUMP_POWER;S.isJumping=true;Audio.sfxJump();}
    if(e.code==='ArrowDown'||e.code==='KeyS') S.isDucking=true;
  } else keys[e.code]=true;
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='ArrowDown'||e.code==='KeyS') S.isDucking=false;
});

function bindBtn(id, action) {
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();action('start');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();action('end');},{passive:false});
  el.addEventListener('mousedown',()=>action('start'));
  el.addEventListener('mouseup',()=>action('end'));
}
bindBtn('btn-left',(ev)=>{ if(!S.running)return; if(ev==='start'&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];} });
bindBtn('btn-right',(ev)=>{ if(!S.running)return; if(ev==='start'&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];} });
bindBtn('btn-jump',(ev)=>{ if(!S.running)return; if(ev==='start'&&!S.isJumping){S.jumpVel=JUMP_POWER;S.isJumping=true;Audio.sfxJump();} });
bindBtn('btn-duck',(ev)=>{ if(!S.running)return; S.isDucking=(ev==='start'); });

// Swipe detection
let touchStartX=0, touchStartY=0, swipeLocked=false;
document.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; swipeLocked=false;
},{passive:true});
document.addEventListener('touchmove',e=>{
  if(swipeLocked||!S.running) return;
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  if(Math.abs(dx)>35&&Math.abs(dx)>Math.abs(dy)*1.5){
    swipeLocked=true;
    if(dx<0&&S.lane>0){S.lane--;S.targetX=LANES[S.lane];}
    if(dx>0&&S.lane<2){S.lane++;S.targetX=LANES[S.lane];}
  }
},{passive:true});

// ── Leaderboard ──────────────────────────────────────────────────────────────
const LB = (() => {
  const KEY = 'sprint_lb_v1';
  const MAX = 5;
  const MEDALS = ['🥇','🥈','🥉','4','5'];
  const ROW_CLASS = ['lb-gold','lb-silver','lb-bronze','',''];

  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch(e) { return []; }
  }
  function save(arr) {
    try { localStorage.setItem(KEY, JSON.stringify(arr)); } catch(e) {}
  }

  // Returns rank (0-based) if score qualifies for top 5, else -1
  function qualifies(score) {
    const entries = load();
    if (entries.length < MAX) return entries.length; // next slot
    const min = entries[entries.length - 1].score;
    if (score > min) return MAX - 1;
    return -1;
  }

  function addEntry(name, score) {
    const entries = load();
    entries.push({ name: name.trim().toUpperCase().slice(0,12) || 'ANON', score: Math.floor(score) });
    entries.sort((a,b) => b.score - a.score);
    const trimmed = entries.slice(0, MAX);
    save(trimmed);
    return trimmed;
  }

  function clear() { save([]); render(-1); }

  function render(highlightScore = -1) {
    const entries = load();
    const tbody = document.getElementById('lb-body');
    const empty  = document.getElementById('lb-empty');
    tbody.innerHTML = '';
    if (entries.length === 0) {
      empty.style.display = 'block';
      document.getElementById('lb-clear-btn').style.display = 'none';
      return;
    }
    empty.style.display = 'none';
    document.getElementById('lb-clear-btn').style.display = 'block';
    entries.forEach((e, i) => {
      const isNew = highlightScore > 0 && e.score === Math.floor(highlightScore) && i === entries.findIndex(x=>x.score===Math.floor(highlightScore));
      const tr = document.createElement('tr');
      if (ROW_CLASS[i]) tr.className = ROW_CLASS[i];
      if (isNew) tr.classList.add('lb-new');
      tr.innerHTML = `
        <td class="lb-rank">${MEDALS[i]}</td>
        <td class="lb-name">${escHtml(e.name)}</td>
        <td class="lb-score">${e.score.toString().padStart(6,'0')}</td>`;
      tbody.appendChild(tr);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Best score from leaderboard
  function bestScore() {
    const e = load();
    return e.length > 0 ? e[0].score : 0;
  }

  // Wire clear button
  document.getElementById('lb-clear-btn').addEventListener('click', () => {
    if (confirm('Hapus semua skor leaderboard?')) clear();
  });

  // Initial render
  render(-1);

  return { qualifies, addEntry, render, bestScore };
})();

// ── Name Entry Modal ──────────────────────────────────────────────────────────
const NameModal = (() => {
  const modal     = document.getElementById('name-modal');
  const input     = document.getElementById('name-input');
  const submitBtn = document.getElementById('name-submit');
  const skipBtn   = document.getElementById('name-skip');
  const scoreEl   = document.getElementById('nm-score-display');
  let _score = 0;
  let _onDone = null;

  function show(score, onDone) {
    _score = score;
    _onDone = onDone;
    scoreEl.textContent = Math.floor(score).toString().padStart(6,'0');
    input.value = '';
    modal.classList.add('visible');
    // Focus with slight delay so soft keyboard opens cleanly on mobile
    setTimeout(() => input.focus(), 120);
  }

  function hide() { modal.classList.remove('visible'); }

  function submit() {
    const name = input.value.trim() || 'ANON';
    hide();
    LB.addEntry(name, _score);
    LB.render(_score);
    if (_onDone) _onDone();
  }

  submitBtn.addEventListener('click', submit);
  skipBtn.addEventListener('click', () => { hide(); LB.render(-1); if (_onDone) _onDone(); });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  // Prevent game keys from firing while typing
  input.addEventListener('keydown', e => e.stopPropagation());

  return { show, hide };
})();


// Pasang listener di sini — setelah startGame terdefinisi
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('start-btn').addEventListener('touchend', e=>{e.preventDefault();startGame();},{passive:false});

function startGame() {
  Audio.init();
  Audio.stopMusic();
  document.getElementById('overlay').style.display='none';
  document.getElementById('touch-controls').style.pointerEvents='all';

  const best = LB.bestScore(); // pakai bestScore dari leaderboard
  S.running=true; S.score=0; S.bestScore=best; S.lives=3; S.speed=12; S.lane=1;
  S.targetX=0; S.playerX=0; S.jumpVel=0; S.playerY=0;
  S.isJumping=false; S.isDucking=false; S.invincible=false;
  S.invincibleTimer=0; S.combo=0; S.comboTimer=0;
  S.tileOffset=0; S.spawnTimer=0; S.spawnInterval=2.2; S.diffTimer=0;
  // Only remove obstacles/coins/particles — never tiles or playerGroup
  obstacles.forEach(o=>{ if(o.mesh.parent) scene.remove(o.mesh); }); obstacles.length=0;
  coins.forEach(c=>{ if(c.mesh.parent) scene.remove(c.mesh); }); coins.length=0;
  particles.forEach(p=>{ if(p.mesh.parent) scene.remove(p.mesh); }); particles.length=0;
  powerups.forEach(p=>{ if(p.mesh.parent) scene.remove(p.mesh); }); powerups.length=0;
  // Reset active power-up visuals silently
  deactivatePowerup(true);
  PU_HUD.hide();
  document.getElementById('slowmo-overlay').classList.remove('active');
  glowSphere.material.color.setHex(0x00c8ff);
  glowSphere.material.opacity = 0.04;
  playerLight.intensity = 0;
  // Reset tile positions to initial state so track looks correct from start
  tiles.forEach((t,i)=>{ t.position.z = -i*TILE_LEN + TILE_LEN*2; });
  // Restore playerGroup in case it was accidentally removed, then reset its transform
  if(!playerGroup.parent) scene.add(playerGroup);
  playerGroup.visible=true;
  playerGroup.scale.set(1,1,1);
  playerGroup.position.set(0,0,0);
  playerGroup.rotation.set(0,0,0);
  // Reset child positions that the run-animation offsets each frame
  body.position.y=1.2; head.position.y=1.85; visor.position.y=1.88;
  for(let i=0;i<5;i++) createCoin(Math.floor(Math.random()*3),-30-i*15);
  updateLivesUI();
  document.getElementById('speed-display').textContent='SPEED: 1.0x';
  // Start music — audio context is alive after user interaction (button click)
  setTimeout(()=>Audio.startMusic(), 100);
  LB.render(-1); // refresh leaderboard tampilan saat game dimulai
}

function gameOver() {
  S.running=false;
  Audio.stopMusic();
  Audio.sfxGameOver();
  document.getElementById('touch-controls').style.pointerEvents='none';

  const finalScore = Math.floor(S.score);
  const rank = LB.qualifies(finalScore);

  function showMenu() {
    document.getElementById('start-btn').textContent='MAIN LAGI';
    document.getElementById('overlay').style.display='flex';
  }

  if (rank >= 0 && finalScore > 0) {
    // Score masuk top 5 — tampilkan name entry dulu
    NameModal.show(finalScore, showMenu);
  } else {
    // Tidak masuk top 5 — langsung ke menu
    LB.render(-1);
    showMenu();
  }
}

function updateLivesUI(){
  document.getElementById('lives-display').textContent='♥ '.repeat(S.lives).trim();
}

// ── Render Loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let lastT=0;
function animate(){
  requestAnimationFrame(animate);
  const now=clock.getElapsedTime();
  const dt=Math.min(now-lastT, 0.05); lastT=now;

  if(!S.running){
    // Idle: animasi mengambang di menu — jangan ubah playerGroup.position karena startGame mereset-nya
    const idleY = Math.sin(now*1.5)*0.05;
    playerGroup.position.set(0, idleY, 0);
    playerGroup.rotation.y=Math.sin(now*0.5)*0.1;
    renderer.render(scene,camera); return;
  }

  S.score += dt*10*(S.speed/12);
  S.diffTimer += dt;
  if(S.diffTimer>8){
    S.diffTimer=0;
    const newSpeed = Math.min((S.activePowerup==='slowmo' ? S.baseSpeed : S.speed) + 0.8, 32);
    if (S.activePowerup === 'slowmo') {
      S.baseSpeed = newSpeed;
      S.speed = newSpeed * 0.5;
    } else {
      S.speed = newSpeed;
    }
    S.spawnInterval=Math.max(S.spawnInterval-0.08,1.0);
    document.getElementById('speed-display').textContent=`SPEED: ${((S.activePowerup==='slowmo'?S.baseSpeed:S.speed)/12).toFixed(1)}x`;
  }
  document.getElementById('score-display').textContent=Math.floor(S.score).toString().padStart(6,'0');

  if(S.comboTimer>0){S.comboTimer-=dt;if(S.comboTimer<=0)S.combo=0;}

  // Player
  S.playerX += (S.targetX-S.playerX)*12*dt;
  if(S.isJumping){
    S.playerY+=S.jumpVel*dt; S.jumpVel-=GRAVITY*dt;
    if(S.playerY<=0){S.playerY=0;S.jumpVel=0;S.isJumping=false;}
  }
  const duckScale=S.isDucking?0.5:1.0;
  playerGroup.scale.y+=(duckScale-playerGroup.scale.y)*15*dt;
  playerGroup.position.set(S.playerX,S.playerY,0);

  if(!S.isJumping){
    const b=Math.sin(now*S.speed*0.7)*0.04;
    body.position.y=1.2+b; head.position.y=1.85+b; visor.position.y=1.88+b;
  }
  const sw=Math.sin(now*S.speed*0.7)*0.4;
  leftLeg.rotation.x=sw; rightLeg.rotation.x=-sw;
  leftArm.rotation.x=-sw*0.6; rightArm.rotation.x=sw*0.6;

  if(S.invincible && S.activePowerup !== 'shield'){
    S.invincibleTimer-=dt;
    playerGroup.visible=Math.sin(now*20)>0;
    if(S.invincibleTimer<=0){S.invincible=false;playerGroup.visible=true;}
  }
  rimLight.intensity=1.5+Math.sin(now*3)*0.5;

  // Tiles
  tiles.forEach(t=>{
    t.position.z+=S.speed*dt;
    if(t.position.z>TILE_LEN*3) t.position.z-=TILE_CNT*TILE_LEN;
  });

  // Spawn obstacles
  S.spawnTimer-=dt;
  if(S.spawnTimer<=0){
    S.spawnTimer=S.spawnInterval+Math.random()*0.5;
    createObstacle(OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)],Math.floor(Math.random()*3),-60);
    if(Math.random()>0.4){
      const cl=Math.floor(Math.random()*3), cy=Math.random()>0.5?0.8:1.8;
      for(let ci=0;ci<3;ci++) createCoin(cl,-60-ci*3,cy);
    }
  }

  // Spawn power-ups (every 20-30s)
  S.powerupSpawnTimer -= dt;
  if (S.powerupSpawnTimer <= 0) {
    S.powerupSpawnTimer = 20 + Math.random() * 10;
    const puType = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
    const puLane = Math.floor(Math.random() * 3);
    createPowerup(puType, puLane, -65);
  }

  // Update & collect power-ups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.mesh.position.z += S.speed * dt;
    pu.mesh.rotation.y += dt * 1.8;
    pu.mesh.rotation.z += dt * 0.9;
    pu.mesh.position.y = 1.0 + Math.sin(now * 2.5 + i) * 0.22; // float
    if (pu.mesh.position.z > 12) { scene.remove(pu.mesh); powerups.splice(i,1); continue; }
    if (!pu.collected) {
      const dx = Math.abs(S.playerX - pu.mesh.position.x);
      const dz = Math.abs(pu.mesh.position.z);
      const dy = Math.abs(S.playerY - pu.mesh.position.y);
      if (dx < 0.9 && dz < 1.2 && dy < 1.0) {
        pu.collected = true;
        spawnParticles(pu.mesh.position.clone(), PU_DEFS[pu.type].color, 14);
        scene.remove(pu.mesh); powerups.splice(i, 1);
        activatePowerup(pu.type);
      }
    }
  }

  // Tick active power-up countdown
  if (S.activePowerup) {
    S.powerupTimer -= dt;
    PU_HUD.update(Math.max(0, S.powerupTimer), S.powerupDuration);

    // Shield: keep invincibleTimer in sync while power-up ticks
    if (S.activePowerup === 'shield') {
      S.invincible = true;
      S.invincibleTimer = S.powerupTimer;
      // Steady visible — override the hit-flicker logic
      playerGroup.visible = true;
      // Pulse glow opacity
      glowSphere.material.opacity = 0.14 + Math.sin(now * 6) * 0.06;
      playerLight.intensity = 2.5 + Math.sin(now * 8) * 0.5;
    }

    // Slowmo: keep speed locked (guard against difficulty bumping it)
    if (S.activePowerup === 'slowmo') {
      S.baseSpeed = Math.min(S.baseSpeed + (S.diffTimer > 0 ? 0 : 0), 32); // passthrough
    }

    if (S.powerupTimer <= 0) deactivatePowerup(false);
  }

  // Update obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const obs=obstacles[i];
    obs.mesh.position.z+=S.speed*dt;
    if(obs.type==='barrier') obs.mesh.rotation.y+=dt*2;
    if(obs.mesh.position.z>12){scene.remove(obs.mesh);obstacles.splice(i,1);continue;}

    if(!S.invincible&&obs.mesh.position.z>-1&&obs.mesh.position.z<2){
      const hb=obs.hb;
      const dx=Math.abs(S.playerX-obs.mesh.position.x);
      const dz=Math.abs(obs.mesh.position.z);
      const pTop=S.isDucking?1.0:2.0;
      const pBot=S.playerY;
      const oTop=hb.yOff+hb.h/2, oBot=hb.yOff-hb.h/2;
      if(dx<(0.3+hb.w/2)&&dz<(0.5+hb.d/2)&&pTop>oBot&&pBot<oTop){
        S.lives--; updateLivesUI();
        Audio.sfxHit();
        spawnParticles(playerGroup.position.clone().add(new THREE.Vector3(0,1,0)),0xff2200,12);
        S.invincible=true; S.invincibleTimer=2.0; S.combo=0;
        if(S.lives<=0){gameOver();return;}
      }
    }
  }

  // Coins
  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];
    c.mesh.position.z+=S.speed*dt; c.mesh.rotation.y+=dt*3;
    if(c.mesh.position.z>12){scene.remove(c.mesh);coins.splice(i,1);continue;}
    if(!c.collected){
      const dx=Math.abs(S.playerX-c.mesh.position.x);
      const dy=Math.abs(S.playerY-c.mesh.position.y);
      const dz=Math.abs(c.mesh.position.z);
      // Magnet: pull coins horizontally toward player and auto-collect from any lane
      const isMagnet = S.activePowerup === 'magnet';
      if (isMagnet && dz < 18 && c.mesh.position.z < 2) {
        // Lerp coin toward player X (magnetic pull)
        c.mesh.position.x += (S.playerX - c.mesh.position.x) * 6 * dt;
        c.mesh.position.y += (1.0 - c.mesh.position.y) * 4 * dt;
      }
      const pickupW = isMagnet ? 1.8 : 0.6;
      const pickupH = isMagnet ? 1.8 : 0.8;
      const pickupD = isMagnet ? 1.8 : 1.0;
      if(dx<pickupW&&dy<pickupH&&dz<pickupD){
        c.collected=true; scene.remove(c.mesh); coins.splice(i,1);
        S.score+=50; S.combo++; S.comboTimer=3;
        Audio.sfxCoin();
        spawnParticles(c.mesh.position.clone(),0xffd700,5);
        if(S.combo>3){
          const el=document.getElementById('combo');
          el.textContent=`COMBO x${S.combo}!`; el.style.opacity='1';
          setTimeout(()=>el.style.opacity='0',600);
        }
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt*1.5;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.vel.y-=9.8*dt; p.mesh.material.opacity=p.life;
    if(p.life<=0){scene.remove(p.mesh);particles.splice(i,1);}
  }

  for(let i=0;i<3;i++) document.getElementById(`dot${i}`).classList.toggle('active',i===S.lane);
  camera.position.x+=(S.playerX*0.1-camera.position.x)*3*dt;
  renderer.render(scene,camera);
}
// Guard: animate() hanya boleh dipanggil SATU KALI
if (!window._sprintLoopStarted) { window._sprintLoopStarted = true; animate(); }

// Resize
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Prevent context menu on long press mobile
window.addEventListener('contextmenu',e=>e.preventDefault());
</script>
